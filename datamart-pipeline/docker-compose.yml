version: "3.8"

services:

  # Base de datos SOLO para los metadatos internos de Airflow
  # (tareas, DAGs, usuarios, logs de ejecución). Separada del DW
  # para no mezclar "infraestructura de Airflow" con "datos de negocio".
  postgres-airflow:
    image: postgres:16
    container_name: postgres-airflow
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      retries: 5

  # Repositorio analítico (Data Warehouse) de DataMart.
  # Puerto distinto (5433) para que no choque con el de Airflow si
  # quieres conectarte desde tu PC con DBeaver/pgAdmin.
  postgres-dw:
    image: postgres:16
    container_name: postgres-dw
    environment:
      POSTGRES_USER: ${DW_USER}
      POSTGRES_PASSWORD: ${DW_PASSWORD}
      POSTGRES_DB: ${DW_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_dw_data:/var/lib/postgresql/data
      # Cualquier .sql puesto aquí se ejecuta automáticamente la
      # PRIMERA vez que se crea el volumen (creación de tablas).
      - ./sql/init_dw.sql:/docker-entrypoint-initdb.d/init_dw.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DW_USER}"]
      interval: 5s
      retries: 5

  # Servicio "de un solo uso" que prepara Airflow:
  # crea las tablas internas, el usuario admin, la Connection al DW
  # y las Variables operativas. Corre una vez y termina (exit 0).
  airflow-init:
    image: apache/airflow:2.9.3
    container_name: airflow-init
    depends_on:
      postgres-airflow:
        condition: service_healthy
      postgres-dw:
        condition: service_healthy
    environment:
      AIRFLOW__WEBSERVER__SECRET_KEY: "datamart-clave-secreta-2026"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _PIP_ADDITIONAL_REQUIREMENTS: "apache-airflow-providers-postgres pandas"
      _DW_USER: ${DW_USER}
      _DW_PASSWORD: ${DW_PASSWORD}
      _DW_DB: ${DW_DB}
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin --password admin \
          --firstname Admin --lastname Admin \
          --role Admin --email admin@admin.com || true &&
        airflow connections delete 'dw_postgres' || true &&
        airflow connections add 'dw_postgres' \
          --conn-type 'postgres' \
          --conn-host 'postgres-dw' \
          --conn-login "$$_DW_USER" \
          --conn-password "$$_DW_PASSWORD" \
          --conn-schema "$$_DW_DB" \
          --conn-port 5432 &&
        airflow variables set REJECT_LOG_TABLE rejected_records &&
        airflow variables set DUPLICATE_PRIORITY_SOURCE online_retail_ii

  airflow-webserver:
    image: apache/airflow:2.9.3
    container_name: airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "datamart-clave-secreta-2026"
      _PIP_ADDITIONAL_REQUIREMENTS: "apache-airflow-providers-postgres pandas"
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    image: apache/airflow:2.9.3
    container_name: airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "datamart-clave-secreta-2026"
      _PIP_ADDITIONAL_REQUIREMENTS: "apache-airflow-providers-postgres pandas"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
    command: scheduler

volumes:
  postgres_airflow_data:
  postgres_dw_data: